
<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ဟင်းချက်နည်းလမ်းညွန်း - Cooking Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B6B;
            --secondary: #FFA500;
            --success: #4ECDC4;
            --danger: #E74C3C;
            --warning: #F39C12;
            --info: #3498DB;
            --light: #F8F9FA;
            --dark: #2C3E50;
            --gold: #FFD700;
        }

        body {
            font-family: 'Segoe UI', 'Padauk', 'Noto Sans Myanmar', 'Myanmar3', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
        }

        /* ============== HEADER ============== */
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            animation: slideInDown 0.6s ease-out;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title h1 {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #FF6B6B 0%, #FFA500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .header-title .emoji-large {
            font-size: 48px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            gap: 8px;
            flex: 1;
            min-width: 300px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #E0E0E0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #FF6B6B;
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
        }

        /* ============== BUTTONS ============== */
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF6B6B 0%, #FFA500 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary {
            background: #F0F0F0;
            color: #333;
            border: 2px solid #E0E0E0;
        }

        .btn-secondary:hover {
            background: #E8E8E8;
            border-color: #FF6B6B;
        }

        .btn-sm {
            padding: 8px 12px;
            font-size: 12px;
        }

        .lang-btn {
            padding: 10px 14px;
            background: #F0F0F0;
            border: 2px solid #DDD;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.3s;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #FF6B6B 0%, #FFA500 100%);
            color: white;
            border-color: #FF6B6B;
        }

        /* ============== FILTER & SORT ============== */
        .filter-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding-top: 15px;
            border-top: 1px solid #E0E0E0;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        select {
            padding: 8px 12px;
            border: 1px solid #DDD;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            background: white;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        /* ============== MAIN GRID ============== */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            margin-bottom: 30px;
        }

        /* ============== TABS ============== */
        .tabs {
            background: white;
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab-btn {
            padding: 12px 18px;
            border: none;
            background: transparent;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            color: #888;
            white-space: nowrap;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .tab-btn.active {
            border-bottom-color: #FF6B6B;
            color: #FF6B6B;
        }

        .tab-btn:hover {
            color: #FFA500;
        }

        /* ============== RECIPE CARDS ============== */
        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .recipe-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s;
            cursor: pointer;
            animation: slideInUp 0.6s ease-out;
        }

        .recipe-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .recipe-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #FF6B6B 0%, #FFA500 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            position: relative;
            overflow: hidden;
        }

        .recipe-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .recipe-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            color: #FF6B6B;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .recipe-badge.time {
            color: #FFA500;
        }

        .recipe-badge.difficulty {
            color: #4ECDC4;
        }

        .recipe-content {
            padding: 20px;
        }

        .recipe-title {
            font-size: 16px;
            font-weight: 800;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.3;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .recipe-cuisine {
            display: inline-block;
            padding: 4px 8px;
            background: #FFE5E5;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            color: #FF6B6B;
            margin-bottom: 10px;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .recipe-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #F0F0F0;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .recipe-description {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 12px;
            min-height: 40px;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .recipe-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .stars {
            color: #FFD700;
            font-size: 12px;
        }

        .rating-text {
            font-size: 11px;
            color: #999;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .recipe-footer {
            display: flex;
            gap: 8px;
        }

        .recipe-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .recipe-btn.primary {
            background: linear-gradient(135deg, #FF6B6B 0%, #FFA500 100%);
            color: white;
        }

        .recipe-btn.primary:hover {
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .recipe-btn.secondary {
            background: #F0F0F0;
            color: #333;
            border: 1px solid #E0E0E0;
        }

        .recipe-btn.secondary:hover {
            background: #E8E8E8;
        }

        /* ============== RECIPE DETAIL ============== */
        .recipe-detail {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            animation: slideInRight 0.6s ease-out;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .detail-header {
            background: linear-gradient(135deg, #FF6B6B 0%, #FFA500 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: start;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .detail-title-section h2 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 10px;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .detail-title-section p {
            font-size: 13px;
            opacity: 0.9;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .detail-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .detail-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .detail-body {
            padding: 30px;
        }

        .detail-section {
            margin-bottom: 30px;
        }

        .detail-section-title {
            font-size: 18px;
            font-weight: 800;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #FFE5E5;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .ingredients-list {
            display: grid;
            gap: 10px;
        }

        .ingredient-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #F9F9F9;
            border-radius: 8px;
            border-left: 3px solid #FF6B6B;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .ingredient-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .ingredient-name {
            flex: 1;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .ingredient-quantity {
            font-size: 11px;
            color: #999;
            background: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .steps-list {
            display: grid;
            gap: 15px;
        }

        .step-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            background: #F9F9F9;
            border-radius: 8px;
        }

        .step-number {
            min-width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #FF6B6B 0%, #FFA500 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
        }

        .step-content {
            flex: 1;
        }

        .step-title {
            font-size: 13px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .step-description {
            font-size: 12px;
            color: #666;
            line-height: 1.6;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .step-time {
            display: inline-block;
            background: #FFF3E0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            color: #FF9800;
            font-weight: 700;
            margin-top: 8px;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .nutrition-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .nutrition-box {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.1) 0%, rgba(255, 165, 0, 0.1) 100%);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #FFE5E5;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .nutrition-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 700;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .nutrition-value {
            font-size: 18px;
            font-weight: 900;
            color: #FF6B6B;
        }

        .nutrition-unit {
            font-size: 10px;
            color: #999;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .tips-box {
            background: #F0F8FF;
            border-left: 4px solid #3498DB;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .tips-title {
            font-size: 12px;
            font-weight: 700;
            color: #3498DB;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .tips-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tip-item {
            font-size: 12px;
            color: #666;
            line-height: 1.5;
            padding-left: 20px;
            position: relative;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .tip-item::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #4ECDC4;
            font-weight: 900;
        }

        /* ============== SIDEBAR ============== */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: fit-content;
        }

        .sidebar-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            animation: slideInRight 0.6s ease-out;
        }

        .panel-title {
            font-size: 14px;
            font-weight: 800;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .category-item {
            padding: 12px;
            background: #F9F9F9;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 3px solid transparent;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .category-item:hover {
            background: #F0F0F0;
            border-left-color: #FF6B6B;
            transform: translateX(5px);
        }

        .category-item.active {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.1) 0%, rgba(255, 165, 0, 0.1) 100%);
            border-left-color: #FF6B6B;
            color: #FF6B6B;
            font-weight: 700;
        }

        .cuisines-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .cuisine-btn {
            padding: 10px;
            background: #F9F9F9;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .cuisine-btn:hover {
            background: #F0F0F0;
            border-color: #FF6B6B;
        }

        .cuisine-btn.active {
            background: linear-gradient(135deg, #FF6B6B 0%, #FFA500 100%);
            color: white;
            border-color: #FF6B6B;
        }

        .timer-box {
            background: linear-gradient(135deg, #FF6B6B 0%, #FFA500 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .timer-label {
            font-size: 11px;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 700;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .timer-display {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
        }

        .timer-controls {
            display: flex;
            gap: 8px;
        }

        .timer-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            font-size: 11px;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .timer-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ============== MODAL ============== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            animation: fadeIn 0.3s ease-out;
        }

        .modal.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideInUp 0.3s ease-out;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #E0E0E0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 800;
            color: #333;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #888;
        }

        .modal-body {
            padding: 20px;
        }

        /* ============== ALERTS ============== */
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 2000;
            animation: slideInRight 0.3s ease-out;
            font-family: 'Padauk', 'Myanmar3', sans-serif;
        }

        .alert.success {
            border-left: 4px solid #27AE60;
        }

        .alert.success .alert-icon {
            color: #27AE60;
        }

        .alert.warning {
            border-left: 4px solid #F39C12;
        }

        .alert.warning .alert-icon {
            color: #F39C12;
        }

        .alert-icon {
            font-size: 18px;
        }

        /* ============== RESPONSIVE ============== */
        @media (max-width: 1200px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .recipe-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .header-title h1 {
                font-size: 28px;
            }

            .search-box {
                width: 100%;
            }

            .recipe-grid {

        let state = {
            currentLanguage: 'my',
            currentTab: 'all',
            favorites: [],
            saved: [],
            recent: [],
            timerSeconds: 0,
            timerRunning: false,
            timerInterval: null,
            activeCategory: null
        };

        // ============== INITIALIZATION ==============
        function init() {
            loadFromStorage();
            setLanguage(state.currentLanguage);
            renderRecipes(RECIPES);
            renderCategories();
            renderCuisines();
            renderTips();
        }

        // ============== LANGUAGE FUNCTIONS ==============
        function setLanguage(lang) {
            state.currentLanguage = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            if (lang === 'my') document.getElementById('myBtn').classList.add('active');
            else if (lang === 'en') document.getElementById('enBtn').classList.add('active');
            else document.getElementById('thBtn').classList.add('active');
            updateUI();
        }

        function t(key) {
            return translations[state.currentLanguage]?.[key] || translations['en'][key] || key;
        }

        function getRecipeTitle(recipe) {
            if (state.currentLanguage === 'my') return recipe.title_my;
            if (state.currentLanguage === 'th') return recipe.title_th;
            return recipe.title_en;
        }

        function getRecipeDesc(recipe) {
            if (state.currentLanguage === 'my') return recipe.description_my;
            if (state.currentLanguage === 'th') return recipe.description_th;
            return recipe.description_en;
        }

        function getIngredientName(ingredient) {
            if (state.currentLanguage === 'my') return ingredient.name_my;
            if (state.currentLanguage === 'th') return ingredient.name_th;
            return ingredient.name_en;
        }

        function getStepTitle(step) {
            if (state.currentLanguage === 'my') return step.title_my;
            if (state.currentLanguage === 'th') return step.title_th;
            return step.title_en;
        }

        function getStepDesc(step) {
            if (state.currentLanguage === 'my') return step.description_my;
            if (state.currentLanguage === 'th') return step.description_th;
            return step.description_en;
        }

        function updateUI() {
            document.getElementById('appTitle').textContent = t('appTitle');
            document.getElementById('cuisineLabel').textContent = t('cuisineLabel');
            document.getElementById('difficultyLabel').textContent = t('difficultyLabel');
            document.getElementById('timeLabel').textContent = t('timeLabel');
            document.getElementById('allTab').textContent = t('allTab');
            document.getElementById('favoritesTab').textContent = t('favoritesTab');
            document.getElementById('recentTab').textContent = t('recentTab');
            document.getElementById('savedTab').textContent = t('savedTab');
            document.getElementById('categoriesTitle').textContent = t('categoriesTitle');
            document.getElementById('cuisinesTitle').textContent = t('cuisinesTitle');
            document.getElementById('timerLabel').textContent = t('timerLabel');
            document.getElementById('tipsTitle').textContent = t('tipsTitle');
            document.getElementById('dailyTip').textContent = t('dailyTip');
        }

        // ============== RECIPE RENDERING ==============
        function renderRecipes(recipes) {
            const grid = document.getElementById('recipeGrid');
            if (recipes.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <div class="no-results-title">${t('noResults')}</div>
                        <div class="no-results-text">${t('tryAdjusting')}</div>
                    </div>
                `;
                return;
            }

            grid.innerHTML = recipes.map(recipe => {
                const difficulty = recipe.difficulty === 'easy' ? t('difficultyLabel').split(':')[0] : recipe.difficulty === 'medium' ? t('difficultyLabel').split(':')[0] : t('difficultyLabel').split(':')[0];
                return `
                    <div class="recipe-card">
                        <div class="recipe-image">
                            ${recipe.emoji}
                            <div class="recipe-badge time">⏱️ ${recipe.cookTime}m</div>
                            <div class="recipe-badge difficulty">${recipe.difficulty.toUpperCase()}</div>
                        </div>
                        <div class="recipe-content">
                            <div class="recipe-cuisine">${recipe.cuisine.toUpperCase()}</div>
                            <div class="recipe-title">${getRecipeTitle(recipe)}</div>
                            <div class="recipe-meta">
                                <div class="meta-item">👥 ${recipe.servings}</div>
                                <div class="meta-item">⏱️ ${recipe.prepTime + recipe.cookTime}min</div>
                            </div>
                            <div class="recipe-description">${getRecipeDesc(recipe)}</div>
                            <div class="recipe-rating">
                                <div class="stars">${'★'.repeat(Math.floor(recipe.rating))}${'☆'.repeat(5-Math.floor(recipe.rating))}</div>
                                <div class="rating-text">${recipe.rating} (${recipe.reviews})</div>
                            </div>
                            <div class="recipe-footer">
                                <button class="recipe-btn primary" onclick="openRecipeDetail(${recipe.id})">
                                    <i class="fas fa-book"></i> ${t('view')}
                                </button>
                                <button class="recipe-btn secondary" onclick="toggleFavorite(${recipe.id})">
                                    <i class="fas fa-${state.favorites.includes(recipe.id) ? 'heart' : 'heart'}"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ============== RECIPE DETAIL ==============
        function openRecipeDetail(id) {
            const recipe = RECIPES.find(r => r.id === id);
            if (!recipe) return;

            if (!state.recent.includes(id)) {
                state.recent.unshift(id);
                saveToStorage();
            }

            const detailBody = document.getElementById('detailBody');
            document.getElementById('detailTitle').textContent = getRecipeTitle(recipe);
            document.getElementById('detailCuisine').textContent = recipe.cuisine.toUpperCase();

            detailBody.innerHTML = `
                <div class="detail-section">
                    <div class="detail-section-title">
                        <i class="fas fa-list"></i> ${t('ingredients')}

                    <div class="ingredients-list">
                        ${recipe.ingredients.map(ing => `
                            <div class="ingredient-item">
                                <input type="checkbox" class="ingredient-checkbox">
                                <span class="ingredient-name">${getIngredientName(ing)}</span>
                                <span class="ingredient-quantity">${ing.amount}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">
                        <i class="fas fa-directions"></i> ${t('instructions')}
                    </div>
                    <div class="steps-list">
                        ${recipe.steps.map((step, index) => `
                            <div class="step-item">
                                <div class="step-number">${index + 1}</div>
                                <div class="step-content">
                                    <div class="step-title">${getStepTitle(step)}</div>
                                    <div class="step-description">${getStepDesc(step)}</div>
                                    <div class="step-time">⏱️ ${step.time}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">
                        <i class="fas fa-apple-alt"></i> ${t('nutrition')}
                    </div>
                    <div class="nutrition-grid">
                        <div class="nutrition-box">
                            <div class="nutrition-label">Calories</div>
                            <div class="nutrition-value">${recipe.nutrition.calories}</div>
                            <div class="nutrition-unit">per serving</div>
                        </div>
                        <div class="nutrition-box">
                            <div class="nutrition-label">Protein</div>
                            <div class="nutrition-value">${recipe.nutrition.protein}</div>
                        </div>
                        <div class="nutrition-box">
                            <div class="nutrition-label">Carbs</div>
                            <div class="nutrition-value">${recipe.nutrition.carbs}</div>
                        </div>
                        <div class="nutrition-box">
                            <div class="nutrition-label">Fat</div>
                            <div class="nutrition-value">${recipe.nutrition.fat}</div>
                        </div>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">
                        <i class="fas fa-lightbulb"></i> ${t('tips')}
                    </div>
                    <div class="tips-box">
                        <div class="tips-list">
                            ${recipe.tips.map(tip => `
                                <div class="tip-item">${tip}</div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('recipeModal').classList.add('show');
        }

        function closeRecipeModal() {
            document.getElementById('recipeModal').classList.remove('show');
        }

        // ============== FILTER & SEARCH ==============
        function filterRecipes() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const cuisine = document.getElementById('cuisineFilter').value;
            const difficulty = document.getElementById('difficultyFilter').value;
            const time = document.getElementById('timeFilter').value;

            let filtered = RECIPES.filter(recipe => {
                const title = getRecipeTitle(recipe).toLowerCase();
                const desc = getRecipeDesc(recipe).toLowerCase();
                const matchSearch = title.includes(search) || desc.includes(search);
                const matchCuisine = !cuisine || recipe.cuisine === cuisine;
                const matchDifficulty = !difficulty || recipe.difficulty === difficulty;

                let matchTime = true;
                if (time === 'quick') matchTime = recipe.cookTime < 30;
                else if (time === 'medium-time') matchTime = recipe.cookTime >= 30 && recipe.cookTime <= 60;
                else if (time === 'slow') matchTime = recipe.cookTime > 60;

                return matchSearch && matchCuisine && matchDifficulty && matchTime;
            });

            renderRecipes(filtered);
        }

        // ============== TABS ==============
        function switchTab(tab) {
            state.currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.tab-btn').classList.add('active');

            let recipes;
            switch (tab) {
                case 'favorites':
                    recipes = RECIPES.filter(r => state.favorites.includes(r.id));
                    break;
                case 'recent':
                    recipes = state.recent.slice(0, 10).map(id => RECIPES.find(r => r.id === id)).filter(r => r);
                    break;
                case 'saved':
                    recipes = RECIPES.filter(r => state.saved.includes(r.id));
                    break;
                default:
                    recipes = RECIPES;
            }
            renderRecipes(recipes);
        }

        // ============== FAVORITES ==============
        function toggleFavorite(id) {
            const index = state.favorites.indexOf(id);
            if (index > -1) {
                state.favorites.splice(index, 1);
            } else {
                state.favorites.push(id);
            }
            saveToStorage();
            showAlert(t('allTab'), 'success');
        }

        // ============== CATEGORIES ==============
        function renderCategories() {
            const categories = ['အားလုံး', 'ခါးများ', 'အုံလွယ်ခြင်းများ', 'ကြော်သည့်များ', 'အရည်ခြင်း', 'အဓိကဟင်းများ', 'ကယ်ရီများ', 'ကင်ခြင်း'];
            const list = document.getElementById('categoriesList');
            list.innerHTML = categories.map((cat, idx) => `
                <div class="category-item ${idx === 0 ? 'active' : ''}" onclick="filterByCategory('${cat.toLowerCase()}')">
                    ${cat}
                </div>
            `).join('');
        }

        function filterByCategory(category) {
            document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
            renderRecipes(RECIPES);
        }

        // ============== CUISINES ==============
        function renderCuisines() {
            const cuisines = ['မြန်မာ', 'ထိုင်း', 'တရုတ်', 'အီတလီ', 'မက္ကစီကို', 'အိန္ဒိယ'];
            const list = document.getElementById('cuisinesList');
            list.innerHTML = cuisines.map(c => `
                <button class="cuisine-btn" onclick="filterByCuisine('${c.toLowerCase()}')">
                    ${c}
                </button>
            `).join('');
        }

        function filterByCuisine(cuisine) {
            const cuisineMap = { 'မြန်မာ': 'burmese', 'ထိုင်း': 'thai', 'တရုတ်': 'chinese', 'အီတလီ': 'italian', 'မက္ကစီကို': 'mexican', 'အိန္ဒိယ': 'indian' };
            const cuisineKey = cuisineMap[cuisine];
            const filtered = RECIPES.filter(r => r.cuisine === cuisineKey);
            renderRecipes(filtered);
        }

        // ============== TIMER ==============
        function setTimer(minutes) {
            state.timerSeconds = minutes * 60;
            updateTimerDisplay();
            pauseTimer();
        }

        function startTimer() {
            if (!state.timerRunning && state.timerSeconds > 0) {
                state.timerRunning = true;
                state.timerInterval = setInterval(() => {
                    state.timerSeconds--;
                    updateTimerDisplay();
                    if (state.timerSeconds <= 0) {
                        pauseTimer();
                        playTimerAlert();
                    }
                }, 1000);
            }
        }

        function pauseTimer() {
            state.timerRunning = false;
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
        }

        function resetTimer() {
            pauseTimer();
            state.timerSeconds = 0;
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(state.timerSeconds / 60);
            const seconds = state.timerSeconds % 60;
            document.getElementById('timerDisplay').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function playTimerAlert() {
            showAlert('အချိန်အပြီးစီးသည်!', 'success');
        }

        // ============== TIPS ==============
        function renderTips() {
            const tips = [
                'ထုတ်မည်မှာ အလိုပြုမီ အစားအစာကို စမ်းသပ်ပါ',
                'အကောင်းဆုံးရလဒ်များအတွက် ကစားအစားအစာများကိုသုံးပါ',
                'ချက်ခြင်းစတင်မီ အားလုံးပစ္စည်းများကိုပြင်ဆင်ပါ',
                'ပုံကျက်ခြင်းအခါ အုပ်စုထည့်သွင်းခြင်းမှ ကင်းကင်းပါ',
                'အသားကို အခြင်းဖြတ်မီ ခြင်းမည်'
            ];
            const tipsList = document.getElementById('tipsList');
            const randomTips = tips.sort(() => Math.random() - 0.5).slice(0, 3);
            tipsList.innerHTML = randomTips.map(tip => `
                <div class="tip-item">${tip}</div>
            `).join('');
        }

        // ============== STORAGE ==============
        function saveToStorage() {
            localStorage.setItem('cookingMasterState', JSON.stringify({
                favorites: state.favorites,
                saved: state.saved,
                recent: state.recent,
                currentLanguage: state.currentLanguage
            }));
        }

        function loadFromStorage() {
            const stored = localStorage.getItem('cookingMasterState');
            if (stored) {
                const data = JSON.parse(stored);
                state.favorites = data.favorites || [];
                state.saved = data.saved || [];
                state.recent = data.recent || [];
                state.currentLanguage = data.currentLanguage || 'my';
            }
        }

        // ============== ALERTS ==============
        function showAlert(message, type) {
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.innerHTML = `
                <span class="alert-icon">${type === 'success' ? '✓' : '!'}</span>
                <span>${message}</span>
            `;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }

        // ============== MODAL CLOSE ==============
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('recipeModal');
            if (e.target === modal) closeRecipeModal();
        });

        // ============== INITIALIZATION ==============
        window.addEventListener('load', init);
    </script>
</body>
</html>
